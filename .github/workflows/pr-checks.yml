name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  guardrails:
    # Keep this name stable because branch protection requires:
    # "PR Checks / guardrails"
    name: guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint checks
        run: bash tools/ci/lint.sh

      - name: Unit tests
        run: bash tools/ci/test.sh

      - name: Unignore Godot test scripts for CI
        run: rm -f game/sim/tests/.gdignore

      - name: Godot simulation tests (GdUnit4)
        uses: godot-gdunit-labs/gdUnit4-action@v1.3.0
        with:
          godot-version: "4.6.1"
          version: "v6.1.1"
          project_dir: "./game"
          paths: "res://sim/tests"
          publish-report: false

      - name: Build sanity
        run: bash tools/ci/build_sanity.sh
