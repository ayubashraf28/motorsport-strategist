name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prod-release:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          PACKAGE_NAME="win64-${GITHUB_REF_NAME}-${SHORT_SHA}.zip"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Package release
        run: |
          mkdir -p artifacts
          echo "tag=${GITHUB_REF_NAME}" > artifacts/release-metadata.txt
          echo "commit_sha=${GITHUB_SHA}" >> artifacts/release-metadata.txt
          echo "short_sha=${{ steps.meta.outputs.short_sha }}" >> artifacts/release-metadata.txt
          echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> artifacts/release-metadata.txt
          git archive --format=zip --output "artifacts/${{ steps.meta.outputs.package_name }}" HEAD

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_name }}
          path: artifacts/
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/${{ steps.meta.outputs.package_name }}
