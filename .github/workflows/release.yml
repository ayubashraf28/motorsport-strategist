name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prod-release:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release
        run: |
          mkdir -p artifacts
          echo "tag=${GITHUB_REF_NAME}" > artifacts/release-metadata.txt
          echo "commit_sha=${GITHUB_SHA}" >> artifacts/release-metadata.txt
          echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> artifacts/release-metadata.txt
          git archive --format=zip --output artifacts/release-${GITHUB_REF_NAME}.zip HEAD

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/release-${{ github.ref_name }}.zip
